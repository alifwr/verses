services:
  backend:
    build: ./backend
    container_name: verse-backend
    ports:
      - "8742:8000"
    depends_on:
      - tunnel
    environment:
      - DATABASE_URL=${BACKEND_DATABASE_URL:-sqlite:///./data/verse.db}
      - SECRET_KEY=${BACKEND_SECRET_KEY:-verse-secret-key-change-in-production}
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3742}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://verse-api.alifpunya.com}
    container_name: verse-frontend
    ports:
      - "3742:3000"
    depends_on:
      - backend
      - tunnel
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: verse-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}

volumes:
  db-data:
